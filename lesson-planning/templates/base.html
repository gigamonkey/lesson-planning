<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lesson Planning{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --gap: #c0392b; --objective: #b7791f; --planned: #2f855a;
      --line: #e2e2e2; --muted: #777; --bg: #fafafa;
    }
    * { box-sizing: border-box; }
    body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0;
           color: #222; background: var(--bg); }
    header { background: #fff; border-bottom: 1px solid var(--line);
             padding: .6rem 1.2rem; display: flex; align-items: center;
             gap: 1.2rem; position: sticky; top: 0; z-index: 5; }
    header h1 { font-size: 1rem; margin: 0; font-weight: 700; }
    header nav a { margin-right: .8rem; text-decoration: none; color: #2b6cb0; }
    header nav a.active { font-weight: 700; color: #222; }
    main { max-width: 1000px; margin: 0 auto; padding: 1.2rem; }

    .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 0 0 1rem;
             padding: .8rem 1rem; background: #fff; border: 1px solid var(--line);
             border-radius: 6px; }
    .stat { line-height: 1.2; }
    .stat b { font-size: 1.4rem; display: block; }
    .stat span { color: var(--muted); font-size: .8rem; }
    .bar { height: 8px; border-radius: 4px; background: #eee; overflow: hidden;
           display: flex; min-width: 220px; align-self: center; flex: 1; }
    .bar i { display: block; height: 100%; }
    .bar .planned { background: var(--planned); }
    .bar .objective { background: var(--objective); }
    .bar .gap { background: var(--gap); }

    .badge { font-size: .68rem; font-weight: 700; text-transform: uppercase;
             letter-spacing: .03em; padding: .05rem .4rem; border-radius: 3px;
             color: #fff; vertical-align: middle; }
    .badge.gap { background: var(--gap); }
    .badge.objective { background: var(--objective); }
    .badge.planned { background: var(--planned); }

    .toolbar { margin-bottom: 1rem; }
    .toolbar a { text-decoration: none; border: 1px solid var(--line);
                 padding: .25rem .7rem; border-radius: 4px; color: #2b6cb0;
                 background: #fff; }
    .toolbar a.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }

    ul.tree, ul.tree ul { list-style: none; margin: 0; padding-left: 1.1rem; }
    ul.tree { padding-left: 0; }
    li.node { padding: .15rem 0 .15rem .8rem; }
    /* Row = [gutter: toggle + id] [content: text, and the leaf's objectives box].
       The id sits in the gutter; the content column wraps with a hanging indent,
       and the objectives box (inside content) aligns with and matches the text. */
    .row { display: flex; align-items: baseline; gap: .4rem; }
    .gutter { flex: none; white-space: nowrap; }
    .content { flex: 1; min-width: 0; }
    .toggle, .toggle-spacer { display: inline-block; width: .95rem; text-align: center;
            color: var(--muted); font-size: .7rem; user-select: none; }
    .toggle { cursor: pointer; transition: transform .12s; }
    .node.collapsed > .row .toggle { transform: rotate(-90deg); }
    .node.collapsed > ul { display: none; }
    .nid { font-family: ui-monospace, monospace; font-size: .82rem; color: var(--muted); }
    .lvl-unit > .row, .lvl-theme > .row, .lvl-big-idea > .row { font-weight: 700; font-size: 1.05rem; }
    .lvl-topic > .row, .lvl-essential-understanding > .row { font-weight: 600; }
    /* Full multi-line leaf text: tight paragraphs + bulleted sub-lists. */
    .leaftext p { margin: 0; }
    .leaftext > * + * { margin-top: .25rem; }
    ul.tree .leaftext ul { list-style: disc; margin: 0; padding-left: 1.2rem; }
    .leaftext li { margin: .05rem 0; }
    .leaftext .badge { margin-left: .3rem; }
    .leafbox { position: relative; border: 1px solid var(--line); border-radius: 6px;
               background: #fff; margin: .3rem 0 .45rem;
               padding: .35rem 2.1rem .35rem .55rem; }
    .leafbox.empty { border: 2px solid var(--gap); cursor: pointer; }
    .noobj { color: var(--muted); font-size: .85rem; font-style: italic; }
    ul.objlist { list-style: disc; margin: 0; padding-left: 1.2rem; }
    /* No bullets in the outline -- the drag grip serves as the marker; pull the
       list flush left so the grips sit where the bullets were. */
    ul.tree ul.objlist { list-style: none; padding-left: 0; }
    ul.objlist li { font-size: .9rem; padding: .03rem 0; }
    ul.objlist li.sortable-ghost { opacity: .4; }
    /* Outline objective <li>s reuse class "obj" as a drag/JS selector, but must
       NOT inherit the .obj card styling (border + bottom-only margin) from the
       objectives/synthesize pages -- that made the box bottom-heavy. Keep them
       plain, with an even gap so top/inter/bottom spacing all match. */
    ul.tree ul.objlist li { padding: 0; margin: 0; }
    ul.tree ul.objlist li + li { margin-top: .35rem; }
    ul.tree ul.objlist li.obj { background: none; border: 0; border-radius: 0; }
    .objrow { display: flex; gap: .35rem; align-items: flex-start; }
    .grip { cursor: grab; color: #c4c4c4; font-size: .85rem; user-select: none; }
    .grip:active { cursor: grabbing; }
    /* flex:1 + min-width:0 so the form (nested in .objrow) grows to fill and the
       input can size below its default width instead of clipping the text. */
    .objedit { display: flex; flex: 1; min-width: 0; gap: .35rem; align-items: flex-start; margin: 0; }
    /* The objective is a textarea so its text wraps; it auto-grows to fit
       (field-sizing in modern browsers, JS autosize() as fallback) and looks
       like plain text until focused. */
    .objedit textarea { flex: 1; min-width: 0; font: inherit; font-size: .9rem; line-height: 1.4;
            border: 1px solid transparent; background: transparent; border-radius: 4px;
            padding: .12rem .3rem; resize: none; overflow: hidden; field-sizing: content; }
    .objedit textarea:focus { border-color: #bcd; background: #fcfdff; outline: none; }
    .objedit button { visibility: hidden; font-size: .78rem; padding: .12rem .5rem; }
    .objedit:focus-within button { visibility: visible; }
    .addbtn { position: absolute; top: .25rem; right: .3rem; width: 1.7rem;
            height: 1.7rem; padding: 0; font-size: 1.3rem; line-height: 1;
            cursor: pointer; color: #2b6cb0; background: #fff;
            border: 1px solid var(--line); border-radius: 4px; }
    .addbtn:hover { background: #eef3f8; }
    code { background: #f0f0f0; padding: 0 .2rem; border-radius: 3px;
           font-family: ui-monospace, monospace; font-size: .9em; }

    table.report { border-collapse: collapse; width: 100%; background: #fff; }
    table.report th, table.report td { border: 1px solid var(--line);
           padding: .4rem .6rem; text-align: left; vertical-align: top; }
    table.report th { background: #f4f4f4; font-size: .82rem; }
    h2 { border-bottom: 2px solid var(--line); padding-bottom: .2rem; margin-top: 1.6rem; }

    button, input[type=text] { font: inherit; }
    button { cursor: pointer; border: 1px solid var(--line); background: #fff;
             border-radius: 4px; padding: .25rem .6rem; }
    button.primary { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
    button.danger { color: var(--gap); border-color: #e3b7b3; }
    .flash { background: #fffbe6; border: 1px solid #f0e0a0; border-radius: 6px;
             padding: .5rem .8rem; margin-bottom: 1rem; }
    .obj { background: #fff; border: 1px solid var(--line); border-radius: 6px;
           padding: .6rem .8rem; margin-bottom: .6rem; }
    .obj .edit { display: flex; gap: .4rem; }
    .obj .edit input[type=text] { flex: 1; padding: .3rem .5rem;
           border: 1px solid var(--line); border-radius: 4px; }
    .chips { margin-top: .4rem; display: flex; gap: .4rem; flex-wrap: wrap;
             align-items: center; }
    .chip { font-family: ui-monospace, monospace; font-size: .8rem;
            background: #eef3f8; border: 1px solid #d6e2ee; border-radius: 12px;
            padding: .05rem .2rem .05rem .5rem; display: inline-flex; align-items: center; gap: .2rem; }
    .chip.unmapped { background: #fdeceb; border-color: #f3c9c4; color: var(--gap); }
    .chip button { border: none; background: none; padding: 0 .2rem; color: var(--muted); }
    .chip form { display: inline; margin: 0; }
    .cluster { background: #fff; border: 1px solid var(--line); border-radius: 6px;
               padding: .7rem .9rem; margin-bottom: .9rem; }
    .cluster table { border-collapse: collapse; width: 100%; margin: .3rem 0; }
    .cluster td { padding: .2rem .4rem; border-bottom: 1px solid #f0f0f0; }
    .sim { font-size: .8rem; color: var(--muted); }
    .inline-add { display: inline-flex; gap: .2rem; }
    .inline-add input { width: 6rem; padding: .1rem .3rem; border: 1px solid var(--line);
            border-radius: 4px; font-family: ui-monospace, monospace; font-size: .8rem; }

    /* Synthesize: two columns */
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
    .col h2 { margin-top: .2rem; }
    ul.objlist.plain { list-style: none; padding-left: 0; }
    ul.objlist.plain li { padding: .1rem 0; }
    ul.objlist.plain label { display: flex; gap: .4rem; align-items: baseline; cursor: pointer; }

    /* Synthesize drag board: learning-objective cards + raw-objective pool. */
    .addlo { display: flex; gap: .4rem; margin-bottom: .7rem; }
    .addlo input { flex: 1; padding: .3rem .5rem; border: 1px solid var(--line); border-radius: 4px; }
    .locard { background: #fff; border: 1px solid var(--line); border-radius: 6px;
              padding: .5rem .6rem; margin-bottom: .6rem; }
    .loedit { display: flex; gap: .4rem; align-items: center; }
    .loedit .edit { flex: 1; display: flex; gap: .35rem; margin: 0; }
    .loedit .edit input { flex: 1; min-width: 0; padding: .25rem .4rem;
              border: 1px solid var(--line); border-radius: 4px; }
    .loedit form { margin: 0; }
    ul.sortable.lorolls, ul.sortable.rawpool { list-style: none; margin: .4rem 0 0;
              padding: .2rem; min-height: 2.4rem; border: 1px dashed var(--line);
              border-radius: 5px; background: var(--bg); }
    ul.sortable.rawpool { margin-top: 0; min-height: 4rem; }
    li.rawitem { display: flex; gap: .4rem; align-items: baseline; background: #fff;
              border: 1px solid var(--line); border-radius: 4px; padding: .25rem .45rem;
              margin: .25rem 0; font-size: .9rem; }
    li.rawitem .grip { cursor: grab; }
    li.rawitem .grip:active { cursor: grabbing; }
    li.rawitem .rawtext { flex: 1; min-width: 0; }
    li.rawitem.sortable-ghost { opacity: .4; }

    /* Lessons board */
    .board { display: grid; grid-template-columns: 280px 1fr; gap: 1rem; align-items: start; }
    .pool, .lessoncard { background: #fff; border: 1px solid var(--line);
            border-radius: 6px; padding: .5rem .6rem; }
    .pool { position: sticky; top: 60px; }
    .pool h2 { margin: .1rem 0 .4rem; font-size: 1rem; }
    .addlesson { display: flex; gap: .4rem; margin-bottom: .7rem; }
    .addlesson input { flex: 1; padding: .3rem .5rem; border: 1px solid var(--line); border-radius: 4px; }
    .lessoncard { margin-bottom: .7rem; }
    .lessonhead { display: flex; align-items: center; gap: .5rem; }
    .lessonhead .edit { flex: 1; }
    .lnum { font-weight: 700; color: var(--muted); }
    .lessonctl { display: flex; gap: .2rem; }
    .lessonctl form { margin: 0; }
    .lessonctl button { padding: .1rem .4rem; }
    ul.sortable { list-style: none; margin: .4rem 0 0; padding: .15rem;
            min-height: 2rem; border: 1px dashed var(--line); border-radius: 5px;
            background: var(--bg); }
    li.lo { background: #fff; border: 1px solid var(--line); border-radius: 4px;
            padding: .25rem .45rem; margin: .25rem 0; cursor: grab; font-size: .9rem; }
    li.lo:active { cursor: grabbing; }
    .drag-ghost { opacity: .4; }
    /* Units group lessons. */
    .addrow { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: .8rem; }
    .addrow .addlesson { margin-bottom: 0; }
    .unit { margin-bottom: 1.1rem; }
    .unithead { display: flex; align-items: center; gap: .5rem; margin-bottom: .2rem;
            border-bottom: 2px solid var(--line); padding-bottom: .2rem; }
    .unit.unassigned .unithead { border-bottom-style: dashed; }
    .unithead .edit { flex: 1; display: flex; gap: .35rem; margin: 0; }
    .unithead .edit input { flex: 1; min-width: 0; font-weight: 700; font-size: 1.02rem;
            padding: .2rem .4rem; border: 1px solid transparent; border-radius: 4px; background: transparent; }
    .unithead .edit input:hover, .unithead .edit input:focus { border-color: var(--line);
            background: #fff; outline: none; }
    .unitlabel { flex: 1; font-weight: 700; color: var(--muted); }
    ul.unitlessons { min-height: 3rem; }
    .lessonhandle { cursor: grab; color: #c4c4c4; font-size: .85rem; }
    .lessonhandle:active { cursor: grabbing; }
    .lessonhead .edit input { flex: 1; min-width: 0; padding: .2rem .4rem;
            border: 1px solid var(--line); border-radius: 4px; }
    ul.unitlessons > li.lessoncard { margin: .35rem 0; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>Lesson Planning</h1>
    <nav>
      {% for c in courses %}
        <a href="{{ url_for('tree', course=c) }}"
           class="{{ 'active' if c == course else '' }}">{{ c|upper }}</a>
      {% endfor %}
    </nav>
    <nav style="margin-left:auto">
      <a href="{{ url_for('tree', course=course) }}">Outline</a>
      <a href="{{ url_for('objectives', course=course) }}">Objectives</a>
      <a href="{{ url_for('synthesize', course=course) }}">Synthesize</a>
      <a href="{{ url_for('lessons', course=course) }}">Lessons</a>
      <a href="{{ url_for('report', course=course) }}">Report</a>
    </nav>
    <form method="post" action="{{ url_for('export', course=course) }}" style="margin:0">
      <button type="submit">Export snapshot</button>
    </form>
  </header>
  <main>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash">{% for m in msgs %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
