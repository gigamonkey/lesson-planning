{% extends "base.html" %}
{% block title %}{{ course|upper }} objectives{% endblock %}

{% block body %}
  <div class="objbar">
    <form method="post" action="{{ url_for('objective_new', course=course) }}" class="objnew">
      <input type="text" name="text" placeholder="Write a new objective…"
             autocomplete="off" required>
      <button type="submit" class="primary">Add</button>
    </form>
    <input type="search" id="obj-search" class="objsearch" autocomplete="off"
           placeholder="filter… (substring or regex)">
    <a class="dlbtn" href="{{ url_for('objectives_tsv', course=course) }}" download
       title="Download objectives as TSV (uuid, text)"><i class="bi bi-download"></i></a>
  </div>

  <p class="objcount"><b id="obj-count">{{ total }}</b> objectives</p>

  <ul class="objlist-compact">
    {% for o in objectives %}
      <li class="oitem">
        <div class="orow">
          <form method="post" class="objedit autosave"
                action="{{ url_for('objective_edit', course=course, uuid=o.uuid) }}"
                hx-post="{{ url_for('objective_edit', course=course, uuid=o.uuid) }}" hx-swap="none">
            <textarea name="text" rows="1">{{ o.text }}</textarea>
          </form>
          {% for id, kind in o.tags %}<span class="otag pill-{{ kind }}">{{ id }}</span>{% endfor %}
        </div>
      </li>
    {% endfor %}
  </ul>

  <script>
    const search = document.getElementById('obj-search');
    const count = document.getElementById('obj-count');
    const items = Array.from(document.querySelectorAll('ul.objlist-compact > li.oitem'));

    function textOf(li) { const t = li.querySelector('textarea'); return t ? t.value : li.textContent; }

    // Live filter: case-insensitive regex when it compiles, else substring.
    function apply() {
      const q = search.value.trim();
      let test = function () { return true; };
      if (q) {
        let re = null;
        try { re = new RegExp(q, 'i'); } catch (e) { re = null; }
        test = re ? function (t) { return re.test(t); }
                  : function (t) { return t.toLowerCase().includes(q.toLowerCase()); };
      }
      let shown = 0;
      items.forEach(function (li) {
        const ok = test(textOf(li));
        li.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      count.textContent = shown;
    }
    search.addEventListener('input', apply);

    // Click to edit: each item is a textarea styled as plain text until focused;
    // it grows to fit, saves on blur (global autosave), and Enter blurs (= save).
    function autosize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
    document.querySelectorAll('.objedit textarea').forEach(autosize);
    document.addEventListener('input', function (e) {
      if (e.target.matches && e.target.matches('.objedit textarea')) autosize(e.target);
    });
    document.addEventListener('keydown', function (e) {
      if (e.target.matches && e.target.matches('.objedit textarea') &&
          e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.target.blur();
      }
    });
  </script>
{% endblock %}
