{% extends "base.html" %}
{% block title %}{{ course|upper }} objectives{% endblock %}

{% block body %}
  <div class="objbar">
    <form method="post" action="{{ url_for('objective_new', course=course) }}" class="objnew">
      <input type="text" name="text" placeholder="Write a new objective…"
             autocomplete="off" required>
      <button type="submit" class="primary">Add</button>
    </form>
    <input type="search" id="obj-search" class="objsearch" autocomplete="off"
           placeholder="filter… (substring or regex)">
  </div>

  <p class="objcount"><b id="obj-count">{{ total }}</b> objectives</p>

  <ul class="objlist-compact">
    {% for o in objectives %}
      <li>
        <span class="otext">{{ o.text|inline }}</span>
        {% for t in o.tags %}<span class="otag">{{ t }}</span>{% endfor %}
      </li>
    {% endfor %}
  </ul>

  <script>
    // Live filter: case-insensitive regex when it compiles, else substring.
    const search = document.getElementById('obj-search');
    const count = document.getElementById('obj-count');
    const items = Array.from(document.querySelectorAll('ul.objlist-compact > li'));
    function apply() {
      const q = search.value.trim();
      let test = function () { return true; };
      if (q) {
        let re = null;
        try { re = new RegExp(q, 'i'); } catch (e) { re = null; }
        test = re ? function (t) { return re.test(t); }
                  : function (t) { return t.toLowerCase().includes(q.toLowerCase()); };
      }
      let shown = 0;
      items.forEach(function (li) {
        const ok = test(li.textContent);
        li.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      count.textContent = shown;
    }
    search.addEventListener('input', apply);
  </script>
{% endblock %}
