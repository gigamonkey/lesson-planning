<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Lesson Planning</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <style>
    body { font: 15px/1.5 -apple-system, system-ui, sans-serif; color: #222;
           background: #fafafa; margin: 0; display: flex; min-height: 100vh;
           align-items: center; justify-content: center; }
    .card { background: #fff; border: 1px solid #e2e2e2; border-radius: 10px;
            padding: 2rem 2.2rem; max-width: 22rem; box-shadow: 0 8px 30px rgba(0,0,0,.06); }
    h1 { font-size: 1.25rem; margin: 0 0 .3rem; }
    p { color: #555; font-size: .9rem; margin: 0 0 1.2rem; }
    .gh { display: inline-flex; align-items: center; gap: .5rem; width: 100%;
          justify-content: center; box-sizing: border-box; padding: .6rem 1rem;
          background: #24292f; color: #fff; border-radius: 6px; text-decoration: none;
          font-weight: 600; }
    .gh:hover { background: #1b1f24; }
    .denied { background: #fdecea; border: 1px solid #f5c2c0; color: #8a1f1a;
              border-radius: 6px; padding: .5rem .7rem; font-size: .85rem; margin: 0 0 1rem; }
    .dev { margin-top: 1.4rem; border-top: 1px solid #eee; padding-top: 1rem; }
    .dev form { display: flex; gap: .4rem; }
    .dev input { flex: 1; padding: .4rem .5rem; border: 1px solid #ddd; border-radius: 5px; font: inherit; }
    .dev button { padding: .4rem .7rem; border: 1px solid #ddd; border-radius: 5px;
                  background: #fff; cursor: pointer; font: inherit; }
    .hint { color: #999; font-size: .78rem; margin: .5rem 0 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lesson Planning</h1>
    <p>Sign in to view and collaborate on course outlines.</p>
    {% if denied %}
      <div class="denied"><strong>{{ denied }}</strong> isn't on the access list.
        Ask the owner to add your GitHub handle.</div>
    {% endif %}
    <a class="gh" href="{{ url_for('collab_oauth_start') }}">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
          1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
          0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27
          2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
          1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
          2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Continue with GitHub
    </a>
    {% if dev_login %}
      <div class="dev">
        <form method="post" action="{{ url_for('collab_devlogin') }}">
          <input type="text" name="handle" placeholder="dev handle" autocomplete="off" required>
          <button type="submit">Dev sign in</button>
        </form>
        <p class="hint">Dev login is enabled (no OAuth). Disable in production.</p>
      </div>
    {% endif %}
  </div>
</body>
</html>
