# Example seed manifest. Point the app at this directory to auto-populate a blank
# database on startup:  LESSON_SEED_DIR=examples/seed uv run app.py
# (or from a terminal:  uv run seed.py examples/seed db.db)
#
# Paths are relative to this file.

[[course]]
id = "widgets"
title = "Intro to Widgets"

  [[course.hierarchy]]
  file = "../widgets-hierarchy.json"   # node-list JSON; flavor read from the file
  # kind defaults from flavor; slug defaults to "widgets-ced"; title derived

  [[course.objectives]]
  file = "../objectives.tsv"           # has a node_id column...
  hierarchy = "widgets-ced"            # ...so categorize it into this hierarchy
